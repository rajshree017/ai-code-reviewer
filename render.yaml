services:
  - type: web
    name: ai-code-reviewer-backend
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: WEBHOOK_GITHUB_TOKEN
        sync: false

  - type: web
    name: ai-code-reviewer-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
